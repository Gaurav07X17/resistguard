services:
  - type: web
    name: resistguard-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false        # fill this in Render dashboard — never hardcode
      - key: JWT_SECRET
        sync: false        # fill this in Render dashboard — never hardcode
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        sync: false        # set to your Vercel URL after frontend is deployed
